<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签快速访问</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <button id="settings-btn" class="settings-btn">
    <svg viewBox="0 0 24 24" width="22" height="22">
      <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
    </svg>
  </button>
    <div class="settings-panel" id="settings-panel" style="display:none;">
      <div class="settings-title">布局设置</div>
      <div class="settings-section">
        <div class="settings-subtitle">可用模块（拖拽到左侧或右侧）</div>
        <div class="module-palette" id="module-palette">
          <div class="module-item" data-module="bookmark-search" draggable="true">
            <span>书签搜索</span>
            <button class="module-add-btn" data-side="left" title="添加到左侧">←</button>
            <button class="module-add-btn" data-side="right" title="添加到右侧">→</button>
          </div>
          <div class="module-item" data-module="folder" draggable="true">
            <span>收藏夹</span>
            <button class="module-add-btn" data-side="left" title="添加到左侧">←</button>
            <button class="module-add-btn" data-side="right" title="添加到右侧">→</button>
          </div>
          <div class="module-item" data-module="web-search" draggable="true">
            <span>网页搜索</span>
            <button class="module-add-btn" data-side="left" title="添加到左侧">←</button>
            <button class="module-add-btn" data-side="right" title="添加到右侧">→</button>
          </div>
          <div class="module-item" data-module="quick-access" draggable="true">
            <span>快速访问</span>
            <button class="module-add-btn" data-side="left" title="添加到左侧">←</button>
            <button class="module-add-btn" data-side="right" title="添加到右侧">→</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-subtitle">左侧模块</div>
        <div class="module-list" id="left-modules"></div>
      </div>
      <div class="settings-section">
        <div class="settings-subtitle">右侧模块</div>
        <div class="module-list" id="right-modules"></div>
      </div>
      <div class="module-config-panel" id="module-config-panel" style="display:none;">
        <div class="config-header">
          <span class="config-title">模块设置</span>
          <button class="config-close" id="config-close">&times;</button>
        </div>
        <div class="config-content" id="config-content"></div>
      </div>
      <button class="reset-layout-btn" id="reset-layout">重置布局</button>
    </div>
    <div class="main-layout">
      <div class="left-panel" id="left-panel"></div>
      <div class="right-panel" id="right-panel"></div>
    </div>
  <script src="newtab.js"></script>
</body>
</html>
